# .github/workflows/build.yml
# تم تصميم التطبيق بواسطة عمر سنجق
# GitHub Actions لبناء APK تلقائياً

name: Build QuickShare APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
    
    - name: ☕ Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: 🔧 Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: 📝 Grant Execute Permission for Gradlew
      run: chmod +x gradlew
    
    - name: 🧹 Clean Project
      run: ./gradlew clean
    
    - name: 🔨 Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: 🔨 Build Release APK
      run: ./gradlew assembleRelease
    
    - name: 📤 Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: QuickShare-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: 📤 Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: QuickShare-Release-APK
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: 📊 Build Summary
      run: |
        echo "## ✅ Build Completed Successfully!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📱 QuickShare APK" >> $GITHUB_STEP_SUMMARY
        echo "- **Version:** 1.0.0" >> $GITHUB_STEP_SUMMARY
        echo "- **Developer:** عمر سنجق" >> $GITHUB_STEP_SUMMARY
        echo "- **Telegram:** https://t.me/Om9r0" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📁 Generated Files:" >> $GITHUB_STEP_SUMMARY
        echo "- Debug APK: \`app/build/outputs/apk/debug/\`" >> $GITHUB_STEP_SUMMARY
        echo "- Release APK: \`app/build/outputs/apk/release/\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "*تم تصميم التطبيق بواسطة عمر سنجق*" >> $GITHUB_STEP_SUMMARY